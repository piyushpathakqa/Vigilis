name: Self-Heal

# Manual, on-demand self-heal: triage a failing spec and, only for DOM drift,
# rewrite the locator, verify green, and open a PR.
#
# Trigger is workflow_dispatch (manual) on purpose — it will NOT fire on its own,
# so there is no surprise API spend or autonomous PR. It also requires the
# ANTHROPIC_API_KEY secret; if that secret is unset, the job no-ops.
#
# To make this fully automatic (TRE-41 ideal — heal on a failed gate), once you're
# comfortable with autonomous CI PRs: add the ANTHROPIC_API_KEY secret and change
# the trigger to:
#   on:
#     workflow_run:
#       workflows: ["QA Gate"]
#       types: [completed]
#   # then gate the job on: if: github.event.workflow_run.conclusion == 'failure'
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the app under test'
        required: true
        default: 'http://localhost:3100/login'
      spec:
        description: 'Path to the failing spec'
        required: true
        default: 'tests/generated/login.spec.ts'

jobs:
  heal:
    name: Triage + heal (DOM drift only)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Guard — require ANTHROPIC_API_KEY
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret not set — skipping self-heal."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        id: guard

      - name: Setup pnpm
        if: steps.guard.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        if: steps.guard.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Install chromium
        if: steps.guard.outputs.skip != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        if: steps.guard.outputs.skip != 'true'
        run: pnpm build

      - name: Self-heal
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node packages/cli/dist/index.js heal "${{ inputs.url }}" --spec "${{ inputs.spec }}"
